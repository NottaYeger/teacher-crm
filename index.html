<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#eeece7;
  --tx:#1a1a18;--tx2:#6b6a66;--br:#e5e3dc;--br2:#cccac3;
  --accent:#2563EB;--accent-bg:#DBEAFE;--accent-tx:#1E40AF;
  --danger-bg:#FEE2E2;--danger-tx:#991B1B;--danger-br:#FCA5A5;
  --success-bg:#DCFCE7;--success-tx:#166534;--success-br:#86EFAC;
  --warn-bg:#FEF9C3;--warn-tx:#854D0E;--warn-br:#FDE047;
  --rad:8px;--radl:12px;
}
.dark{
  --bg:#18181b;--bg2:#27272a;--bg3:#09090b;
  --tx:#fafafa;--tx2:#a1a1aa;--br:#3f3f46;--br2:#52525b;
  --accent:#3B82F6;--accent-bg:#1e3a5f;--accent-tx:#93C5FD;
  --danger-bg:#450a0a;--danger-tx:#fca5a5;--danger-br:#7f1d1d;
  --success-bg:#052e16;--success-tx:#86efac;--success-br:#14532d;
  --warn-bg:#422006;--warn-tx:#fde68a;--warn-br:#78350f;
  color-scheme:dark;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}

/* ── Login ── */
#loginScreen{display:flex;position:fixed;inset:0;z-index:9999;align-items:center;justify-content:center}
#loginScreen.dark{background:#09090b}
#loginScreen:not(.dark){background:#eeece7}
.login-box{border-radius:16px;padding:32px;width:340px;max-width:92%}
.dark .login-box{background:#18181b;border:0.5px solid #3f3f46}
.login-box:not(.dark){background:#fff;border:0.5px solid #e5e3dc}

/* ── App ── */
.app{display:flex;height:100dvh;position:relative;background:var(--bg3);color:var(--tx)}
.sidebar{width:262px;min-width:262px;background:var(--bg);border-right:0.5px solid var(--br);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:680px){
  .sidebar{position:fixed;left:-262px;top:0;bottom:0;z-index:200;transition:left .25s;box-shadow:4px 0 24px rgba(0,0,0,.2)}
  .sidebar.open{left:0}
  .mob-ov{display:block!important}
  .mob-btn{display:flex!important}
}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199}
.mob-btn{display:none;align-items:center;justify-content:center;width:30px;height:30px;border-radius:6px;border:0.5px solid var(--br2);background:transparent;color:var(--tx);font-size:17px;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--br);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-track{background:var(--bg2)}
.content::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
#SL::-webkit-scrollbar{width:5px}
#SL::-webkit-scrollbar-track{background:var(--bg)}
#SL::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
.sh{padding:10px 12px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.sh h2{font-size:13px;font-weight:600;color:var(--tx)}
button{cursor:pointer;font-family:inherit}
.btn{padding:5px 12px;border-radius:var(--rad);border:0.5px solid var(--br2);background:transparent;color:var(--tx);font-size:12px}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{opacity:.85}
.btn-d{background:var(--danger-bg);color:var(--danger-tx);border-color:var(--danger-br)}
.btn-icon{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--br2);background:transparent;color:var(--tx);font-size:15px;display:flex;align-items:center;justify-content:center}
.btn-icon:hover{background:var(--bg2)}
.si{padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--br);display:flex;align-items:center;gap:8px;user-select:none}
.si:hover,.si.active{background:var(--bg2)}
.si.drag-over{border-top:2px solid var(--accent)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.sn{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{font-size:11px;color:var(--tx2)}
.drag-handle{color:var(--tx2);font-size:13px;cursor:grab;padding:0 2px;flex-shrink:0}
.bdg{display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-bl{background:var(--accent-bg);color:var(--accent-tx)}
.b-gr{background:var(--success-bg);color:var(--success-tx)}
.b-rd{background:var(--danger-bg);color:var(--danger-tx)}
.b-am{background:var(--warn-bg);color:var(--warn-tx)}

.cd{min-height:50px;border-radius:6px;border:0.5px solid var(--br);padding:3px;background:var(--bg);cursor:pointer}

.ld{border-radius:3px;padding:1px 4px;font-size:9px;font-weight:600;overflow:hidden;white-space:nowrap;margin-top:2px}
.pn{background:var(--bg);border-radius:var(--radl);border:0.5px solid var(--br);padding:14px}
.pt{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:0.5px solid var(--br);flex-wrap:wrap}
.row:last-child{border-bottom:none}
.sb{padding:3px 8px;border-radius:20px;font-size:10px;cursor:pointer;border:0.5px solid var(--br2);background:transparent;color:var(--tx2);font-family:inherit}
.sb:hover{background:var(--bg2)}
.sb.s-done{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-br)}
.sb.s-miss{background:var(--danger-bg);color:var(--danger-tx);border-color:var(--danger-br)}
.sb.s-paid{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-br)}
.sb.s-unpaid{background:var(--warn-bg);color:var(--warn-tx);border-color:var(--warn-br)}
.ls-sep{width:1px;background:var(--br2);align-self:stretch;margin:0 2px;flex-shrink:0}
.mo{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:100}
.md{background:var(--bg);border-radius:var(--radl);border:0.5px solid var(--br);padding:20px;width:360px;max-width:96%;max-height:90vh;overflow-y:auto}
.md h3{font-size:15px;font-weight:600;color:var(--tx);margin-bottom:14px}
.fg{margin-bottom:10px}
.fl{font-size:11px;color:var(--tx2);margin-bottom:3px;display:block;font-weight:500}
.fi{width:100%;padding:7px 10px;border-radius:var(--rad);border:1px solid var(--br2);background:var(--bg2);color:var(--tx);font-size:13px;font-family:inherit}

.fr2{display:flex;gap:8px}
.fa{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}
.ta{width:100%;min-height:55px;padding:7px 10px;border-radius:var(--rad);border:1px solid var(--br2);background:var(--bg2);color:var(--tx);font-size:13px;resize:vertical;font-family:inherit}
.ta:focus{outline:none;border-color:var(--accent)}
.hwi{display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--br)}
.hwi:last-child{border-bottom:none}
.hwc{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--br2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px}
.hwc.done{background:var(--success-bg);border-color:var(--success-br);color:var(--success-tx)}
.pb{height:3px;border-radius:2px;background:var(--br);margin-top:4px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:var(--accent)}
.srch{padding:7px 10px;border-radius:var(--rad);border:1px solid var(--br2);background:var(--bg2);color:var(--tx);font-size:12px;margin:8px;width:calc(100% - 16px);font-family:inherit}
.srch:focus{outline:none;border-color:var(--accent)}
.si-ind{font-size:10px;color:var(--tx2);padding:3px 9px;border-radius:20px;background:var(--bg2);white-space:nowrap}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

/* iOS touch fix */
.row[onclick], .mc[onclick], .si, .cd, .sb, .btn, .btn-p, .btn-d, .btn-icon, .tab, .note-chip, .cp-sw, .db-btn, .hwc, .drag-handle {

* { -webkit-touch-callout: none; }

<script>
// iOS Safari: divs with onclick don't always fire — this fixes it
document.addEventListener('DOMContentLoaded', function() {
  function fixTouchTargets() {
    document.querySelectorAll('[onclick]').forEach(el => {
      if(el.tagName !== 'BUTTON' && el.tagName !== 'A') {
        el.style.cursor = 'pointer';
        if(!el._touchFixed) {
          el._touchFixed = true;
          el.addEventListener('touchend', function(e) {
            e.preventDefault();
            this.click();
          }, {passive: false});
        }
      }
    });
  }
  fixTouchTargets();
  // Re-run after each render since content is dynamic
  const observer = new MutationObserver(fixTouchTargets);
  observer.observe(document.body, {childList: true, subtree: true});
});
</script>

// ── Supabase ──
function getSB(){
  if(!_sb&&SUPABASE_URL!=='ТВОЙ_SUPABASE_URL'){
    _sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
  }
  return _sb;
}

async function initApp(){
  // Show login by default while we check session
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  const sb=getSB();
  if(!sb){useOffline();return;}
  // check existing session
  const {data:{session}}=await sb.auth.getSession();
  if(session){_user=session.user;showApp();await cloudLoad();}
  else{showLogin();}
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){_user=session.user;showApp();await cloudLoad();}
    if(event==='SIGNED_OUT'){_user=null;showLogin();}
  });
}

function showLogin(){
  const ls=document.getElementById('loginScreen');
  ls.style.display='flex';
  ls.style.alignItems='center';
  ls.style.justifyContent='center';
  document.getElementById('app').style.display='none';
}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
  const lb=document.getElementById('logoutBtn');
  if(lb)lb.style.display=_offline?'none':'block';
}
function showErr(m){const e=document.getElementById('loginError');e.textContent=m;e.style.display='block';}

async function doLogin(){
  const sb=getSB();if(!sb){showErr('Supabase не настроен — см. инструкцию');return;}
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  if(!email||!pass){showErr('Введи email и пароль');return;}
  document.getElementById('loginBtn').textContent='Вхожу...';
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showErr(error.message);document.getElementById('loginBtn').textContent='Войти';}
}
async function doRegister(){
  const sb=getSB();if(!sb){showErr('Supabase не настроен');return;}
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  if(!email||!pass){showErr('Введи email и пароль');return;}
  if(pass.length<6){showErr('Пароль минимум 6 символов');return;}
  const{error}=await sb.auth.signUp({email,password:pass});
  if(error)showErr(error.message);
  else showErr('✓ Проверь email для подтверждения регистрации');
}
async function doLogout(){
  const sb=getSB();if(sb)await sb.auth.signOut();
  _user=null;S.students=[];showLogin();
}
function useOffline(){
  _offline=true;showApp();localLoad();
}

// ── Load / Save ──
function migrate(students){
  (students||[]).forEach(s=>{
    if(!s.monthPayments)s.monthPayments={};
    if(s.type==='company'&&!s.payouts)s.payouts=[];
  });
  return students;
}

async function cloudLoad(){
  const sb=getSB();
  if(!sb||!_user){localLoad();return;}
  try{
    setInd('Загрузка...');
    const{data,error}=await sb.from('crm_data').select('data').eq('user_id',_user.id).maybeSingle();
    if(error)throw error;
    if(data?.data){
      S.students=migrate(data.data.students||[]);
      S.dark=data.data.dark!==undefined?data.data.dark:true;
    } else {
      // First login — try to import local data
      const raw=localStorage.getItem('tcrm_v5');
      if(raw){const d=JSON.parse(raw);S.students=migrate(d.students||[]);S.dark=d.dark!==undefined?d.dark:true;}
      else{S.students=migrate(JSON.parse(JSON.stringify(DS)));S.dark=true;}
      await cloudSave(); // push to cloud on first login
    }
    applyTheme();setInd('☁️ Синхронизировано');renderAll();
  }catch(e){
    console.error(e);localLoad();
  }
}

function localLoad(){
  try{
    const raw=localStorage.getItem('tcrm_v5');
    if(raw){const d=JSON.parse(raw);S.students=migrate(d.students||[]);S.dark=d.dark!==undefined?d.dark:true;}
    else{S.students=migrate(JSON.parse(JSON.stringify(DS)));S.dark=true;}
  }catch(e){S.students=migrate(JSON.parse(JSON.stringify(DS)));S.dark=true;}
  applyTheme();setInd('💾 Локально');renderAll();
}

async function cloudSave(){
  const sb=getSB();if(!sb||!_user)return;
  const payload={students:S.students,dark:S.dark};
  const{error}=await sb.from('crm_data').upsert(
    {user_id:_user.id,data:payload,updated_at:new Date().toISOString()},
    {onConflict:'user_id'}
  );
  if(error)throw error;
}

function save(){
  // Always save locally immediately
  try{localStorage.setItem('tcrm_v5',JSON.stringify({students:S.students,dark:S.dark}));}
  catch(e){}
  clearTimeout(saveT);
  setInd('Сохранение...');
  saveT=setTimeout(async()=>{
    if(_offline||!_user||!getSB()){setInd('💾 Сохранено');return;}
    try{await cloudSave();setInd('☁️ Синхронизировано');}
    catch(e){console.error(e);setInd('⚠️ Ошибка синхр.');}
  },800);
}

// ── Helpers ──
function setInd(t){const e=document.getElementById('SI');if(e)e.textContent=t;}
function gi(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')+'₽'}
function mkKey(y,m){return y+'-'+m}
function glm(s,y,m){return(s.lessons||[]).filter(l=>{const d=new Date(l.date);return d.getFullYear()===y&&d.getMonth()===m})}

// ── Finance ──
function gexp(s,y,m){
  if(s.type==='company') return(s.payouts||[]).filter(p=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m}).reduce((a,p)=>a+p.amount,0);
  if(s.payType==='month'){const ls=glm(s,y,m).filter(l=>!l.missed);return ls.length*s.rate;}
  // lesson: non-missed OR missed-but-paid (late cancel = still income)
  return glm(s,y,m).filter(l=>!l.missed||l.paid).length*s.rate;
}
function gearn(s,y,m){
  if(s.type==='company') return(s.payouts||[]).filter(p=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m&&p.received}).reduce((a,p)=>a+p.amount,0);
  if(s.payType==='month'){const key=mkKey(y,m);return(s.monthPayments||{})[key]?gexp(s,y,m):0;}
  return glm(s,y,m).filter(l=>l.paid).length*s.rate;
}
function gdebt(s,y,m){
  if(s.type==='company')return 0;
  if(s.payType==='month'){const e=gexp(s,y,m),ea=gearn(s,y,m);return e>0?e-ea:0;}
  return glm(s,y,m).filter(l=>l.done&&!l.missed&&!l.paid).length*s.rate;
}
function texp(y,m){return S.students.reduce((a,s)=>a+gexp(s,y,m),0)}
function tearn(y,m){return S.students.reduce((a,s)=>a+gearn(s,y,m),0)}
function tdebt(y,m){return S.students.reduce((a,s)=>a+gdebt(s,y,m),0)}
function tyear(){let t=0;const y=S.date.getFullYear();for(let m=0;m<12;m++)t+=texp(y,m);return t}
function tyearActual(){let t=0;const y=S.date.getFullYear();for(let m=0;m<12;m++)t+=tearn(y,m);return t}
function toggleYearMode(){yearMode=yearMode==='forecast'?'actual':'forecast';renderAll();}
function yearLabel(){return yearMode==='forecast'?'Прогноз за год ↕':'Фактически за год ↕'}
function yearValue(){return yearMode==='forecast'?tyear():tyearActual()}

function rCal(){
  const y=S.date.getFullYear(),m=S.date.getMonth();
  const first=new Date(y,m,1);let sdow=first.getDay()-1;if(sdow<0)sdow=6;
  const dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate(),tod=new Date();
  const allL=S.students.filter(s=>s.type==='student').flatMap(s=>glm(s,y,m).map(l=>({...l,s})));
  const bd={};allL.forEach(l=>{const d=new Date(l.date).getDate();if(!bd[d])bd[d]=[];bd[d].push(l)});
  S.students.filter(s=>s.type==='company').forEach(s=>{
    (s.payouts||[]).filter(p=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m}).forEach(p=>{
      const d=new Date(p.date).getDate();if(!bd[d])bd[d]=[];bd[d].push({...p,s,isPayout:true});
    });
  });
  let cells=[];
  for(let i=0;i<sdow;i++)cells.push({day:dipm-sdow+1+i,cur:false});
  for(let i=1;i<=dim;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-sdow-dim+1,cur:false});
  return `<div class="pn"><div class="cal">
    ${DN.map(d=>`<div class="cdn">${d}</div>`).join('')}
    ${cells.map(c=>{
      const isT=c.cur&&c.day===tod.getDate()&&y===tod.getFullYear()&&m===tod.getMonth();
      const ls=c.cur?(bd[c.day]||[]):[];
      return `<div class="cd${isT?' today':''}${!c.cur?' oth':''}" onclick="${c.cur?`cdc(${c.day})`:''}">
        <div class="cdnum">${c.day}</div>
        ${ls.slice(0,2).map(l=>{const bg=palBg(l.s);
          if(l.isPayout)return `<div class="ld" style="background:${bg};color:#fff;opacity:${l.received?1:.5}">$ ${gi(l.s.name)}</div>`;
          return `<div class="ld" style="background:${bg};color:#fff;opacity:${l.missed?.4:1};text-decoration:${l.missed?'line-through':'none'}">${gi(l.s.name)}</div>`;
        }).join('')}
        ${ls.length>2?`<div style="font-size:8px;color:var(--tx2)">+${ls.length-2}</div>`:''}
      </div>`;
    }).join('')}
  </div></div>
  <div class="pn"><div class="pt">Уроки — ${MN[m]}</div>
    ${S.students.filter(s=>s.type==='student').flatMap(s=>glm(s,y,m).map(l=>({...l,s}))).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(l=>{
      const bg=palBg(l.s),d=new Date(l.date);
      return `<div class="row">
        <div class="av" style="width:22px;height:22px;font-size:9px;background:${bg};color:#fff">${gi(l.s.name)}</div>
        <div style="font-size:11px;color:var(--tx2);min-width:48px">${d.getDate()} ${MS2[d.getMonth()]}</div>
        <div style="flex:1;font-size:12px;color:var(--tx)">${l.s.name}</div>
        ${lBtns(l.s.id,l.id,l,l.s.payType)}
      </div>`;
    }).join('')||`<div style="font-size:12px;color:var(--tx2)">Нет уроков в этом месяце</div>`}
  </div>`;
}

function lBtns(sid,lid,l,payType){
  const missed=!!l.missed,done=!!l.done;
  const paidBtn=payType==='lesson'?`<div class="ls-sep"></div><button class="sb${l.paid?' s-paid':''}" onclick="togPaid(${sid},${lid})">${l.paid?'✓ Оплачен':'Не оплачен'}</button>`:'';

}

      <span><span style="display:inline-block;width:9px;height:9px;background:var(--accent-bg);border-radius:2px;margin-right:3px"></span>Ожидаемый</span>
      <span><span style="display:inline-block;width:9px;height:9px;background:var(--accent);border-radius:2px;margin-right:3px"></span>Получено</span>
    </div>
  </div>

function rSt(){
  const s=S.students.find(x=>x.id===S.selId);

  const exp=gexp(s,y,m),debt=gdebt(s,y,m),earn=gearn(s,y,m),total=s.lessons.filter(l=>l.done).length;

  return `<div class="pn" style="display:flex;align-items:flex-start;gap:12px">

        <span class="bdg b-bl">${s.level}</span>

  </div>

    <div class="pt">Оплата за ${MN[m]}
      <button class="sb${monthPaid?' s-paid':' s-unpaid'}" style="font-size:12px;padding:4px 12px" onclick="togMP(${s.id},${y},${m})">${monthPaid?'✓ Оплачено за месяц':'Не оплачено за месяц'}</button>
    </div>
    <div style="font-size:12px;color:var(--tx2)">${fmt(s.rate)} × ${ls.filter(l=>!l.missed).length} уроков = <strong style="color:var(--tx)">${fmt(exp)}</strong></div>
  </div>`:''}
  <div class="pn"><div class="pt">Уроки — ${MN[m]}
    <div style="display:flex;gap:5px">
      <button class="btn" style="font-size:11px" onclick="oRep(${s.id})">Повторяющийся</button>
      <button class="btn btn-p" style="font-size:11px" onclick="oAl(${s.id})">+ Урок</button>
    </div>
  </div>
    ${ls.length===0?`<div style="font-size:12px;color:var(--tx2)">Нет уроков в этом месяце</div>`:
    ls.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(l=>{const d=new Date(l.date);
      return `<div class="row">
        <div style="font-size:11px;color:var(--tx2);min-width:46px">${d.getDate()} ${MS2[d.getMonth()]}</div>
        <div style="flex:1">${lBtns(s.id,l.id,l,s.payType)}</div>
        <button class="note-chip" onclick="editNote(${s.id},${l.id})">${l.note||'+ заметка'}</button>
        <button class="sb" onclick="dl(${s.id},${l.id})" style="color:var(--danger-tx)">✕</button>
      </div>`;}).join('')}
  </div>
  <div class="pn"><div class="pt">Домашние задания
    <button class="btn btn-p" style="font-size:11px" onclick="oAh(${s.id})">+ Задание</button>
  </div>
    ${s.hw.length===0?`<div style="font-size:12px;color:var(--tx2)">Нет заданий</div>`:
    s.hw.map((h,i)=>`<div class="hwi">
      <div class="hwc${h.d?' done':''}" onclick="th(${s.id},${i})">${h.d?'✓':''}</div>
      <span style="flex:1;font-size:12px;color:var(--tx);${h.d?'text-decoration:line-through;opacity:.5':''}">${h.t}</span>
      <button class="sb" onclick="dh(${s.id},${i})" style="color:var(--danger-tx)">✕</button>

  return `<div class="pn" style="display:flex;align-items:flex-start;gap:12px">
    <div class="av" style="width:48px;height:48px;font-size:16px;background:${bg};color:#fff;flex-shrink:0">${gi(s.name)}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600;color:var(--tx);margin-bottom:5px">${s.name}</div>
      <span class="bdg b-te">Платформа / Компания</span>
      <div style="font-size:11px;color:var(--tx2);margin-top:6px">${s.notes||''}</div>
    </div>
    <div style="display:flex;gap:5px"><button class="btn" onclick="oEs(${s.id})">Редакт.</button><button class="btn btn-d" onclick="confDel(${s.id})">Удалить</button></div>
  </div>
  <div class="mg">
    <div class="mc"><div class="ml">Получено: ${MS2[m]}</div><div class="mv">${fmt(totM)}</div></div>
    <div class="mc"><div class="ml">Ожидается: ${MS2[m]}</div><div class="mv">${fmt(mop.filter(p=>!p.received).reduce((a,p)=>a+p.amount,0))}</div></div>
    <div class="mc"><div class="ml">Следующая ~</div><div class="mv" style="font-size:14px">${nextP}</div></div>
    <div class="mc"><div class="ml">Всего получено</div><div class="mv">${fmt(totAll)}</div></div>
  </div>
  <div class="pn"><div class="pt">Выплаты — ${MN[m]}
    <button class="btn btn-p" style="font-size:11px" onclick="oAddPayout(${s.id})">+ Внести выплату</button>
  </div>
    ${mop.length===0?`<div style="font-size:12px;color:var(--tx2)">Нет выплат в этом месяце</div>`:
    mop.sort((a,b)=>new Date(a.date)-new Date(b.date)).map(p=>{const d=new Date(p.date);return `<div class="pay-row">
      <span style="font-size:11px;color:var(--tx2);min-width:55px">${d.getDate()} ${MS2[d.getMonth()]}</span>
      <span style="flex:1;font-size:12px;color:var(--tx)">${p.note||'Выплата'}</span>
      <span style="font-size:12px;font-weight:600;color:${p.received?'var(--success-tx)':'var(--tx2)'};">${fmt(p.amount)}</span>
      <button class="sb${p.received?' s-paid':' s-unpaid'}" onclick="togPR(${s.id},${p.id})">${p.received?'✓ Получено':'Ожидается'}</button>
      <button class="sb" onclick="delPayout(${s.id},${p.id})" style="color:var(--danger-tx)">✕</button>
    </div>`;}).join('')}
  </div>
  <div class="pn"><div class="pt">История выплат</div>
    ${(s.payouts||[]).slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>{const d=new Date(p.date);return `<div class="pay-row">
      <span style="font-size:11px;color:var(--tx2);min-width:80px">${d.getDate()} ${MS2[d.getMonth()]} ${d.getFullYear()}</span>
      <span style="flex:1;font-size:12px;color:var(--tx)">${p.note||'Выплата'}</span>

      <span style="font-size:12px;font-weight:600;color:${p.received?'var(--success-tx)':'var(--tx2)'};">${fmt(p.amount)}</span>

// ── Actions ──
function setDone(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.done=true;l.missed=false;save();renderAll()}
function setMissed(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.missed=!l.missed;l.done=false;save();renderAll()}
function togPaid(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.paid=!l.paid;save();renderAll()}
function togMP(sid,y,m){
  const s=S.students.find(x=>x.id===sid);
  if(!s.monthPayments)s.monthPayments={};
  const k=mkKey(y,m);s.monthPayments[k]=!s.monthPayments[k];
  // Sync individual lessons
  const paid=s.monthPayments[k];
  glm(s,y,m).filter(l=>!l.missed).forEach(l=>l.paid=paid);
  save();renderAll();
}
function togPR(sid,pid){const s=S.students.find(x=>x.id===sid),p=(s.payouts||[]).find(x=>x.id===pid);if(p)p.received=!p.received;save();renderAll()}
function th(sid,i){const s=S.students.find(x=>x.id===sid);s.hw[i].d=!s.hw[i].d;save();renderAll()}
function dh(sid,i){S.students.find(x=>x.id===sid).hw.splice(i,1);save();renderAll()}
function sn(sid,v){S.students.find(x=>x.id===sid).notes=v;save()}
function dl(sid,lid){const s=S.students.find(x=>x.id===sid);s.lessons=s.lessons.filter(l=>l.id!==lid);save();renderAll()}
function mapd(sid,y,m){const s=S.students.find(x=>x.id===sid);
  if(s.payType==='month'){if(!s.monthPayments)s.monthPayments={};s.monthPayments[mkKey(y,m)]=true;glm(s,y,m).filter(l=>!l.missed).forEach(l=>l.paid=true);}
  else{glm(s,y,m).filter(l=>l.done&&!l.missed&&!l.paid).forEach(l=>l.paid=true);}
  save();renderAll();}
function delPayout(sid,pid){const s=S.students.find(x=>x.id===sid);s.payouts=(s.payouts||[]).filter(p=>p.id!==pid);save();renderAll()}
function editNote(sid,lid){
  const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);
  showMod(`<h3>Заметка к уроку</h3>
    <div class="fg"><label class="fl">${new Date(l.date).toLocaleDateString('ru-RU',{day:'numeric',month:'long'})}</label>
    <textarea class="ta" id="f-note" style="min-height:80px">${l.note||''}</textarea></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="saveNote(${sid},${lid})">Сохранить</button></div>`);
}
function saveNote(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.note=document.getElementById('f-note').value.trim();save();cM();renderAll()}
function cdc(day){
  const y=S.date.getFullYear(),m=S.date.getMonth(),dt=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const stus=S.students.filter(s=>s.type==='student');if(!stus.length)return;
  const opts=stus.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  showMod(`<h3>Добавить урок — ${day} ${MS2[m]}</h3>
    <div class="fg"><label class="fl">Ученик</label><select class="fi" id="f-sid">${opts}</select></div>
    <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-note" placeholder="Тема урока..."></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="alD('${dt}')">Добавить</button></div>`);
}
function alD(dt){const sid=parseInt(document.getElementById('f-sid').value),note=document.getElementById('f-note').value;S.students.find(x=>x.id===sid).lessons.push({id:Date.now(),date:dt,done:false,paid:false,note});save();cM();renderAll()}
function oAl(sid){const t=new Date().toISOString().split('T')[0];
  showMod(`<h3>Добавить урок</h3>
    <div class="fg"><label class="fl">Дата</label><input class="fi" id="f-dt" type="date" value="${t}"></div>
    <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-nt" placeholder="Тема урока..."></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aL(${sid})">Добавить</button></div>`);
}
function aL(sid){const dt=document.getElementById('f-dt').value,nt=document.getElementById('f-nt').value;if(!dt)return;S.students.find(x=>x.id===sid).lessons.push({id:Date.now(),date:dt,done:false,paid:false,note:nt});save();cM();renderAll()}
function oRep(sid){
  selDays=new Set();
  showMod(`<h3>Повторяющийся урок</h3>
    <p style="font-size:11px;color:var(--tx2);margin-bottom:10px">Дни недели и количество месяцев вперёд</p>
    <div class="fg"><label class="fl">Дни недели</label>
      <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
        ${DN.map((d,i)=>`<button class="db-btn" id="db-${i}" onclick="tD(${i})">${d}</button>`).join('')}
      </div>
    </div>
    <div class="fg"><label class="fl">На сколько месяцев вперёд</label>
      <select class="fi" id="f-months">
        <option value="1">1 месяц</option><option value="2">2 месяца</option>
        <option value="3" selected>3 месяца</option><option value="6">6 месяцев</option>
        <option value="12">12 месяцев</option>
      </select>
    </div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aRep(${sid})">Создать расписание</button></div>`);
}
function tD(i){if(selDays.has(i))selDays.delete(i);else selDays.add(i);const b=document.getElementById('db-'+i);if(b)b.className='db-btn'+(selDays.has(i)?' sel':'')}
function aRep(sid){
  if(!selDays.size){cM();return}
  const s=S.students.find(x=>x.id===sid),ahead=parseInt(document.getElementById('f-months').value)||3,sy=S.date.getFullYear(),sm=S.date.getMonth();
  for(let mi=0;mi<ahead;mi++){let mm=sm+mi,yy=sy;while(mm>11){mm-=12;yy++;}
    const dim=new Date(yy,mm+1,0).getDate();
    for(let d=1;d<=dim;d++){const dt=new Date(yy,mm,d);let dow=dt.getDay()-1;if(dow<0)dow=6;
      if(selDays.has(dow)){const ds=`${yy}-${String(mm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(!s.lessons.some(l=>l.date===ds))s.lessons.push({id:Date.now()+mi*10000+d,date:ds,done:false,paid:false,note:''});}}}
  selDays=new Set();save();cM();renderAll();
}
function oAh(sid){showMod(`<h3>Домашнее задание</h3><div class="fg"><label class="fl">Задание</label><textarea class="ta" id="f-hw" placeholder="Упражнения, эссе..."></textarea></div><div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aH(${sid})">Добавить</button></div>`)}
function aH(sid){const t=(document.getElementById('f-hw').value||'').trim();if(!t)return;S.students.find(x=>x.id===sid).hw.push({t,d:false});save();cM();renderAll()}
function oAddPayout(sid){const t=new Date().toISOString().split('T')[0];
  showMod(`<h3>Внести выплату</h3>
    <div class="fg"><label class="fl">Дата</label><input class="fi" id="f-dt" type="date" value="${t}"></div>
    <div class="fg"><label class="fl">Сумма (₽)</label><input class="fi" id="f-amt" type="number" placeholder="18500"></div>
    <div class="fg"><label class="fl">Примечание</label><input class="fi" id="f-note" placeholder="Выплата 1–15 мая"></div>
    <div class="fg" style="display:flex;align-items:center;gap:8px">
      <input type="checkbox" id="f-rcv" style="width:16px;height:16px;accent-color:var(--accent)">
      <label for="f-rcv" class="fl" style="margin:0;cursor:pointer">Уже получено</label>
    </div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="addPayout(${sid})">Добавить</button></div>`);
}
function addPayout(sid){const s=S.students.find(x=>x.id===sid),dt=document.getElementById('f-dt').value,amt=parseFloat(document.getElementById('f-amt').value)||0,note=document.getElementById('f-note').value,received=document.getElementById('f-rcv').checked;if(!dt||amt<=0)return;if(!s.payouts)s.payouts=[];s.payouts.push({id:Date.now(),date:dt,amount:amt,note,received});save();cM();renderAll()}

// ── Backup ──
function openBackup(){
  showMod(`<h3>Бэкап данных</h3>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:14px">Экспортируй данные в JSON-файл и импортируй на любом устройстве.</p>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-p" onclick="exportData()">⬇ Экспортировать JSON</button>
      <div style="font-size:11px;color:var(--tx2);text-align:center">— или —</div>
      <label class="fl">Импортировать из файла</label>
      <input type="file" accept=".json" class="fi" id="f-import" onchange="importData(this)">
    </div>
    <div class="fa"><button class="btn" onclick="cM()">Закрыть</button></div>`);
}
function exportData(){
  const data=JSON.stringify({students:S.students,dark:S.dark,exported:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`crm-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
}
function importData(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.students)throw new Error('Неверный формат');
      if(confirm(`Импортировать ${d.students.length} учеников? Текущие данные будут заменены.`)){
        S.students=migrate(d.students);S.dark=d.dark!==undefined?d.dark:S.dark;
        save();cM();applyTheme();renderAll();alert('Импорт успешен!');
      }
    }catch(err){alert('Ошибка: '+err.message);}
  };
  reader.readAsText(file);
}

// ── Color picker ──
function cpHtml(cur){return `<div class="color-picker">${PALETTE.map((p,i)=>`<div class="cp-sw${i===cur?' sel':''}" style="background:${p.bg}" onclick="pickC(${i})" title="${p.lbl}">${i===cur?'✓':''}</div>`).join('')}</div>`}
function pickC(i){_pc=i;document.querySelectorAll('.cp-sw').forEach((el,idx)=>{el.classList.toggle('sel',idx===i);el.textContent=idx===i?'✓':'';})}

// ── Add/Edit student ──
function openAddSt(){
  _pc=S.students.length%PALETTE.length;
  showMod(`<h3>Новый ученик</h3>
    <div class="fg"><label class="fl">Тип</label>
      <select class="fi" id="f-type" onchange="togType()">
        <option value="student">Частный ученик</option>
        <option value="company">Платформа / Компания</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Имя / Название</label><input class="fi" id="f-nm" placeholder="Анна Петрова / SkyEng"></div>
    <div id="f-sf">
      <div class="fr2">
        <div class="fg" style="flex:1"><label class="fl">Уровень</label><select class="fi" id="f-lv">${LV.map(l=>`<option>${l}</option>`).join('')}</select></div>
        <div class="fg" style="flex:1"><label class="fl">Фокус</label><input class="fi" id="f-fc" placeholder="IELTS, speaking..."></div>
      </div>
      <div class="fr2">
        <div class="fg" style="flex:1"><label class="fl">Телефон</label><input class="fi" id="f-ph"></div>
        <div class="fg" style="flex:1"><label class="fl">Telegram</label><input class="fi" id="f-tg" placeholder="@username"></div>
      </div>
      <div class="fg"><label class="fl">Тип оплаты</label>
        <select class="fi" id="f-pt">
          <option value="lesson">Поурочно</option>
          <option value="month">Помесячно (ставка × кол-во уроков)</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Стоимость одного урока (₽)</label><input class="fi" id="f-rt" type="number" value="1500"></div>
    </div>
    <div id="f-cf" style="display:none">
      <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-cnote" placeholder="Выплаты раз в 2 недели..."></div>
    </div>
    <div class="fg"><label class="fl">Цвет</label>${cpHtml(_pc)}</div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aSt()">Добавить</button></div>`);
}
function togType(){const v=document.getElementById('f-type').value;document.getElementById('f-sf').style.display=v==='student'?'':'none';document.getElementById('f-cf').style.display=v==='company'?'':'none'}
function aSt(){
  const nm=(document.getElementById('f-nm').value||'').trim();if(!nm)return;
  const type=document.getElementById('f-type').value,id=Date.now();
  if(type==='company'){S.students.push({id,name:nm,type:'company',payType:'company',color:_pc,level:'',phone:'',tg:'',focus:'',rate:0,notes:document.getElementById('f-cnote').value,lessons:[],hw:[],payouts:[],monthPayments:{}});}
  else{const pt=document.getElementById('f-pt').value;S.students.push({id,name:nm,level:document.getElementById('f-lv').value,focus:document.getElementById('f-fc').value||'Общий',phone:document.getElementById('f-ph').value,tg:document.getElementById('f-tg').value,type:'student',payType:pt,color:_pc,rate:parseInt(document.getElementById('f-rt').value||1500),lessons:[],hw:[],notes:'',monthPayments:{}});}
  save();cM();S.selId=id;S.view='st';renderAll();
}
function oEs(sid){
  const s=S.students.find(x=>x.id===sid);_pc=s.color;
  if(s.type==='company'){showMod(`<h3>Редактировать: ${s.name}</h3>
    <div class="fg"><label class="fl">Название</label><input class="fi" id="f-nm" value="${s.name}"></div>
    <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-cnote" value="${s.notes||''}"></div>
    <div class="fg"><label class="fl">Цвет</label>${cpHtml(s.color)}</div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="svSt(${sid})">Сохранить</button></div>`);return;}
  showMod(`<h3>Редактировать ученика</h3>
    <div class="fg"><label class="fl">Имя</label><input class="fi" id="f-nm" value="${s.name}"></div>
    <div class="fr2">
      <div class="fg" style="flex:1"><label class="fl">Уровень</label><select class="fi" id="f-lv">${LV.map(l=>`<option${l===s.level?' selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fg" style="flex:1"><label class="fl">Фокус</label><input class="fi" id="f-fc" value="${s.focus||''}"></div>
    </div>
    <div class="fr2">
      <div class="fg" style="flex:1"><label class="fl">Телефон</label><input class="fi" id="f-ph" value="${s.phone||''}"></div>
      <div class="fg" style="flex:1"><label class="fl">Telegram</label><input class="fi" id="f-tg" value="${s.tg||''}"></div>
    </div>
    <div class="fg"><label class="fl">Тип оплаты</label>
      <select class="fi" id="f-pt">
        <option value="lesson"${s.payType==='lesson'?' selected':''}>Поурочно</option>
        <option value="month"${s.payType==='month'?' selected':''}>Помесячно (ставка × кол-во уроков)</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Стоимость одного урока (₽)</label><input class="fi" id="f-rt" type="number" value="${s.rate}"></div>
    <div class="fg"><label class="fl">Цвет</label>${cpHtml(s.color)}</div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="svSt(${sid})">Сохранить</button></div>`);
}
function svSt(sid){
  const s=S.students.find(x=>x.id===sid);s.name=(document.getElementById('f-nm').value||s.name).trim();s.color=_pc;
  if(s.type==='company'){s.notes=document.getElementById('f-cnote')?.value||s.notes;}
  else{s.level=document.getElementById('f-lv').value;s.focus=document.getElementById('f-fc').value||s.focus;s.phone=document.getElementById('f-ph').value;s.tg=document.getElementById('f-tg').value;s.payType=document.getElementById('f-pt').value;s.rate=parseInt(document.getElementById('f-rt').value)||s.rate;}
  save();cM();renderAll();
}
function confDel(sid){const s=S.students.find(x=>x.id===sid);showMod(`<h3>Удалить?</h3><p style="font-size:12px;color:var(--tx2);margin-bottom:12px">«${s.name}» будет удалён навсегда.</p><div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-d" onclick="dSt(${sid})">Удалить</button></div>`)}
function dSt(sid){S.students=S.students.filter(s=>s.id!==sid);S.selId=null;S.view='ov';save();cM();renderAll()}
function showMod(h){const m=document.getElementById('MOD');m.style.pointerEvents='auto';m.innerHTML=`<div class="mo" onclick="cMO(event)"><div class="md">${h}</div></div>`}
function cMO(e){if(e.target.classList.contains('mo'))cM()}
function cM(){const m=document.getElementById('MOD');m.innerHTML='';m.style.pointerEvents='none';}

// ── Start ──
initApp();
</script>

<script>
// ── PWA: inject manifest dynamically ──
const manifest = {
  name: "Teacher CRM",
  short_name: "TeacherCRM",
  description: "CRM для преподавателей английского",
  start_url: "./",
  display: "standalone",
  background_color: "#09090b",
  theme_color: "#09090b",
  icons: [{
    src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%2318181b'/><text y='.9em' font-size='72' x='50%25' text-anchor='middle'>📚</text></svg>",
    sizes: "192x192",
    type: "image/svg+xml"
  }]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const murl = URL.createObjectURL(blob);
document.getElementById('manifestLink').href = murl;

// ── Service Worker: cache for offline ──
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE = 'teacher-crm-v1';
    const ASSETS = [self.location.href];
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      if(e.request.method !== 'GET') return;
      e.respondWith(
        fetch(e.request)
          .then(r => { const clone = r.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); return r; })
          .catch(() => caches.match(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], {type:'text/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, {scope: './'})
    .then(() => console.log('SW registered'))
    .catch(e => console.log('SW error', e));
}
</script>
