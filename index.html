<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher CRM</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#eeece7;
  --tx:#1a1a18;--tx2:#6b6a66;--br:#e5e3dc;--br2:#cccac3;
  --shadow:0 1px 3px rgba(0,0,0,.06);--rad:8px;--radl:12px;
  --accent:#378ADD;--accent-bg:#E6F1FB;--accent-tx:#0C447C;
  --danger-bg:#FCEBEB;--danger-tx:#791F1F;--danger-br:#F7C1C1;
  --success-bg:#EAF3DE;--success-tx:#27500A;--success-br:#C0DD97;
}
.dark{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#1a1a18;
  --tx:#f0ede8;--tx2:#9b9a96;--br:#333331;--br2:#444441;
  --shadow:0 1px 3px rgba(0,0,0,.3);
  --accent-bg:#0d2540;--accent-tx:#7ab8e8;
  --danger-bg:#2d1212;--danger-tx:#f09595;--danger-br:#6b2020;
  --success-bg:#0d2010;--success-tx:#97c459;--success-br:#2d5010;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;background:var(--bg3);color:var(--tx);height:100dvh;overflow:hidden;transition:background .2s,color .2s}
.app{display:flex;height:100dvh;position:relative;background:var(--bg3)}
.sidebar{width:262px;min-width:262px;background:var(--bg);border-right:0.5px solid var(--br);display:flex;flex-direction:column;overflow:hidden;transition:background .2s,border-color .2s}
@media(max-width:640px){
  .sidebar{position:fixed;left:-262px;top:0;bottom:0;z-index:200;transition:left .25s,background .2s;box-shadow:4px 0 20px rgba(0,0,0,.2)}
  .sidebar.open{left:0}
  .mob-ov{display:block!important}
  .mob-btn{display:flex!important}
}
.mob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199}
.mob-btn{display:none;width:28px;height:28px;border-radius:var(--rad);border:0.5px solid var(--br2);background:transparent;color:var(--tx);font-size:16px;align-items:center;justify-content:center;cursor:pointer}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--br);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .2s}
.content{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.sh{padding:10px 12px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.sh h2{font-size:13px;font-weight:500;color:var(--tx)}
button{cursor:pointer;font-family:inherit}
.btn{padding:5px 11px;border-radius:var(--rad);border:0.5px solid var(--br2);background:transparent;color:var(--tx);font-size:12px;transition:background .12s}
.btn:hover{background:var(--bg2)}
.btn-p{background:var(--accent-bg);color:var(--accent-tx);border-color:var(--accent)}
.btn-p:hover{opacity:.85}
.btn-d{background:var(--danger-bg);color:var(--danger-tx);border-color:var(--danger-br)}
.btn-icon{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--br2);background:transparent;color:var(--tx2);font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .12s}
.btn-icon:hover{background:var(--bg2)}
.si{padding:8px 12px;cursor:pointer;border-bottom:0.5px solid var(--br);display:flex;align-items:center;gap:8px;transition:background .1s}
.si:hover,.si.active{background:var(--bg2)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.sn{font-size:13px;font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss{font-size:11px;color:var(--tx2)}
.bdg{display:inline-flex;align-items:center;padding:1px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-bl{background:var(--accent-bg);color:var(--accent-tx)}
.b-gr{background:var(--success-bg);color:var(--success-tx)}
.b-rd{background:var(--danger-bg);color:var(--danger-tx)}
.b-am{background:#FAEEDA;color:#633806}
.b-gy{background:var(--bg2);color:var(--tx2)}
.b-pu{background:#EEEDFE;color:#3C3489}
.b-te{background:#E1F5EE;color:#085041}
.dark .b-am{background:#3a1e00;color:#e8a456}
.dark .b-pu{background:#1e1c40;color:#afa9ec}
.dark .b-te{background:#072018;color:#56c49a}
.tabs{display:flex;padding:0 10px;border-bottom:0.5px solid var(--br);background:var(--bg);overflow-x:auto;gap:2px;transition:background .2s}
.tab{padding:8px 10px;font-size:12px;cursor:pointer;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-0.5px;white-space:nowrap}
.tab.active{color:var(--tx);border-bottom-color:var(--tx);font-weight:500}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:9px}
.mc{background:var(--bg2);border-radius:var(--rad);padding:10px 12px;transition:background .2s}
.ml{font-size:11px;color:var(--tx2);margin-bottom:2px}
.mv{font-size:19px;font-weight:500;color:var(--tx)}
.ms{font-size:11px;color:var(--tx2);margin-top:1px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cdn{text-align:center;font-size:10px;color:var(--tx2);padding:2px 0;font-weight:500}
.cd{min-height:50px;border-radius:var(--rad);border:0.5px solid var(--br);padding:3px;background:var(--bg);cursor:pointer;transition:background .1s}
.cd:hover{background:var(--bg2)}.cd.today{border-color:var(--accent)}.cd.oth{opacity:.3}
.cdnum{font-size:11px;color:var(--tx2);font-weight:500}.cd.today .cdnum{color:var(--accent)}
.ld{border-radius:3px;padding:1px 3px;font-size:9px;font-weight:500;overflow:hidden;white-space:nowrap;margin-top:2px}
.pn{background:var(--bg);border-radius:var(--radl);border:0.5px solid var(--br);padding:13px;box-shadow:var(--shadow);transition:background .2s,border-color .2s}
.pt{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--br);flex-wrap:wrap}
.row:last-child{border-bottom:none}
.sb{padding:2px 7px;border-radius:20px;font-size:10px;cursor:pointer;border:0.5px solid var(--br);background:transparent;color:var(--tx2);font-family:inherit;transition:background .1s}
.sb:hover{background:var(--bg2)}
.sb.s-done{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-br)}
.sb.s-miss{background:var(--danger-bg);color:var(--danger-tx);border-color:var(--danger-br)}
.sb.s-paid{background:var(--success-bg);color:var(--success-tx);border-color:var(--success-br)}
.sb.s-unpaid{background:#FAEEDA;color:#633806;border-color:#FAC775}
.dark .sb.s-unpaid{background:#3a1e00;color:#e8a456;border-color:#7a4a10}
.ls-sep{width:1px;background:var(--br);align-self:stretch;margin:0 3px;flex-shrink:0}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(2px)}
.md{background:var(--bg);border-radius:var(--radl);border:0.5px solid var(--br);padding:18px;width:360px;max-width:95%;max-height:90dvh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.md h3{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:13px}
.fg{margin-bottom:9px}
.fl{font-size:11px;color:var(--tx2);margin-bottom:3px;display:block}
.fi{width:100%;padding:6px 9px;border-radius:var(--rad);border:0.5px solid var(--br2);background:var(--bg);color:var(--tx);font-size:12px;font-family:inherit;transition:background .2s}
.fi:focus{outline:none;border-color:var(--accent)}
.fr2{display:flex;gap:7px}
.fa{display:flex;gap:6px;justify-content:flex-end;margin-top:13px}
.ta{width:100%;min-height:50px;padding:6px 9px;border-radius:var(--rad);border:0.5px solid var(--br2);background:var(--bg);color:var(--tx);font-size:12px;resize:vertical;font-family:inherit}
.ta:focus{outline:none;border-color:var(--accent)}
.hwi{display:flex;align-items:flex-start;gap:6px;padding:5px 0;border-bottom:0.5px solid var(--br)}
.hwi:last-child{border-bottom:none}
.hwc{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--br2);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:9px}
.hwc.done{background:var(--success-bg);border-color:var(--success-br);color:var(--success-tx)}
.pb{height:4px;border-radius:2px;background:var(--br);margin-top:3px;overflow:hidden}
.pf{height:100%;border-radius:2px;background:var(--accent)}
.srch{padding:6px 9px;border-radius:var(--rad);border:0.5px solid var(--br2);background:var(--bg2);color:var(--tx);font-size:12px;margin:7px;width:calc(100% - 14px);font-family:inherit}
.srch:focus{outline:none;border-color:var(--accent)}
.si-ind{font-size:10px;color:var(--tx2);padding:2px 8px;border-radius:20px;background:var(--bg2)}
.db-btn{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--br2);background:transparent;color:var(--tx2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.db-btn.sel{background:var(--accent-bg);color:var(--accent-tx);border-color:var(--accent)}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.cp-sw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .1s}
.cp-sw:hover{transform:scale(1.2)}.cp-sw.sel{border-color:var(--tx)}
.pay-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:0.5px solid var(--br);flex-wrap:wrap}
.pay-row:last-child{border-bottom:none}
</style>
</head>
<body>
<div class="app dark" id="app">
  <div class="mob-ov" id="mobOv" onclick="closeSB()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sh">
      <h2>Ученики</h2>
      <button class="btn btn-p" onclick="openAddSt()">+ Добавить</button>
    </div>
    <input class="srch" placeholder="Поиск..." id="srch" oninput="renderSL()">
    <div id="SL" style="overflow-y:auto;flex:1"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:7px">
        <button class="mob-btn" id="mobBtn" onclick="openSB()">☰</button>
        <button class="btn" onclick="pm()">&#8592;</button>
        <span style="font-size:13px;font-weight:500;min-width:145px;text-align:center" id="MT"></span>
        <button class="btn" onclick="nm()">&#8594;</button>
        <button class="btn" onclick="gt()" style="font-size:11px">Сегодня</button>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Сменить тему">☀️</button>
        <span class="si-ind" id="SI">Загрузка...</span>
      </div>
    </div>
    <div class="tabs">
      <div class="tab" onclick="sv('ov')" id="v-ov">Обзор</div>
      <div class="tab" onclick="sv('cal')" id="v-cal">Календарь</div>
      <div class="tab" onclick="sv('fin')" id="v-fin">Финансы</div>
      <div class="tab" onclick="sv('st')" id="v-st">Ученик</div>
    </div>
    <div class="content" id="MC"></div>
  </div>
  <div id="MOD"></div>
</div>
<script>
const PALETTE=[
  {bg:'#E6F1FB',tx:'#0C447C',name:'Синий'},
  {bg:'#EAF3DE',tx:'#27500A',name:'Зелёный'},
  {bg:'#FAEEDA',tx:'#633806',name:'Янтарный'},
  {bg:'#EEEDFE',tx:'#3C3489',name:'Фиолетовый'},
  {bg:'#FAECE7',tx:'#712B13',name:'Коралловый'},
  {bg:'#FBEAF0',tx:'#72243E',name:'Розовый'},
  {bg:'#E1F5EE',tx:'#085041',name:'Бирюзовый'},
  {bg:'#F1EFE8',tx:'#444441',name:'Серый'},
  {bg:'#FCF0E8',tx:'#6B3A12',name:'Оранжевый'},
  {bg:'#F0EBF8',tx:'#4A2370',name:'Сирень'},
];
const PAL_DARK=[
  {bg:'#0d2540',tx:'#7ab8e8'},{bg:'#0d2010',tx:'#97c459'},
  {bg:'#3a1e00',tx:'#e8a456'},{bg:'#1e1c40',tx:'#afa9ec'},
  {bg:'#2d1208',tx:'#e07a55'},{bg:'#2d1020',tx:'#e07aaa'},
  {bg:'#072018',tx:'#56c49a'},{bg:'#252523',tx:'#9b9a96'},
  {bg:'#2d1800',tx:'#d4894a'},{bg:'#1c1030',tx:'#b388dd'},
];
const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MS=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
const MS2=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
const DN=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const LV=['A1','A2','B1','B2','C1','C2'];
const DS=[
  {id:1,name:'Анна Петрова',level:'B2',phone:'',tg:'@anna_p',focus:'Разговорный',payType:'month',rate:1500,mrate:0,color:0,type:'student',
   lessons:[{id:1,date:'2026-05-02',done:true,paid:true,note:'Past Perfect'},{id:2,date:'2026-05-06',done:true,paid:true,note:''},{id:3,date:'2026-05-09',done:true,paid:false,note:''},{id:4,date:'2026-05-13',done:false,paid:false,note:''},{id:5,date:'2026-05-16',done:false,paid:false,note:''},{id:6,date:'2026-05-20',done:false,paid:false,note:''},{id:7,date:'2026-05-23',done:false,paid:false,note:''},{id:8,date:'2026-05-27',done:false,paid:false,note:''}],
   hw:[{t:'Unit 5 упр. 1-5',d:false},{t:'Эссе 200 слов',d:true}],notes:'Хорошая грамматика, нужен speaking',monthPayments:{}},
  {id:2,name:'Дмитрий Кузнецов',level:'A2',phone:'',tg:'',focus:'Грамматика',payType:'lesson',rate:1200,mrate:0,color:1,type:'student',
   lessons:[{id:1,date:'2026-05-04',done:true,paid:true,note:''},{id:2,date:'2026-05-11',done:false,paid:false,note:'Болел',missed:true},{id:3,date:'2026-05-18',done:false,paid:false,note:''},{id:4,date:'2026-05-25',done:false,paid:false,note:''}],
   hw:[{t:'Артикли — тест стр.34',d:false}],notes:'Начинающий, хороший прогресс',monthPayments:{}},
  {id:3,name:'Мария Сидорова',level:'C1',phone:'',tg:'@maria_s',focus:'IELTS',payType:'lesson',rate:2000,mrate:0,color:3,type:'student',
   lessons:[{id:1,date:'2026-05-01',done:true,paid:true,note:''},{id:2,date:'2026-05-05',done:true,paid:true,note:''},{id:3,date:'2026-05-08',done:true,paid:true,note:''},{id:4,date:'2026-05-12',done:false,paid:false,note:''},{id:5,date:'2026-05-15',done:false,paid:false,note:''},{id:6,date:'2026-05-19',done:false,paid:false,note:''}],
   hw:[{t:'Writing Task 2',d:false},{t:'Listening mock',d:false}],notes:'Цель IELTS 7.5',monthPayments:{}},
  {id:4,name:'SkyEng',level:'',phone:'',tg:'',focus:'',payType:'company',rate:0,mrate:0,color:6,type:'company',
   lessons:[],hw:[],notes:'Выплаты раз в 2 недели.',monthPayments:{},
   payouts:[{id:1,date:'2026-04-15',amount:18500,note:'Выплата 1–15 апр'},{id:2,date:'2026-04-30',amount:21000,note:'Выплата 16–30 апр'},{id:3,date:'2026-05-15',amount:19800,note:'Выплата 1–15 мая'}]},
];

let S={date:new Date(),selId:null,view:'ov',students:[],dark:true};
let saveT=null,selDays=new Set(),_pc=0;

function isDark(){return document.getElementById('app').classList.contains('dark')}
function pal(s){return isDark()?PAL_DARK[s.color%10]:PALETTE[s.color%10]}

function load(){
  try{
    const raw=localStorage.getItem('tcrm_data');
    if(raw){const d=JSON.parse(raw);S.students=d.students||[];S.dark=d.dark!==undefined?d.dark:true;}
    else{S.students=JSON.parse(JSON.stringify(DS));S.dark=true;}
  }catch(e){S.students=JSON.parse(JSON.stringify(DS));S.dark=true;}
  applyTheme();setInd('Готово ✓');renderAll();
}
function save(){
  clearTimeout(saveT);setInd('Сохранение...');
  saveT=setTimeout(()=>{
    try{localStorage.setItem('tcrm_data',JSON.stringify({students:S.students,dark:S.dark}));setInd('Сохранено ✓');}
    catch(e){setInd('Ошибка сохранения');}
  },600);
}
function applyTheme(){
  const app=document.getElementById('app');
  if(S.dark)app.classList.add('dark');else app.classList.remove('dark');
  document.getElementById('themeBtn').textContent=S.dark?'☀️':'🌙';
}
function toggleTheme(){S.dark=!S.dark;applyTheme();save();}
function setInd(t){const e=document.getElementById('SI');if(e)e.textContent=t;}
function gi(n){return(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function fmt(n){return Math.round(n||0).toLocaleString('ru-RU')+'₽'}
function mkKey(y,m){return y+'-'+m}
function glm(s,y,m){return(s.lessons||[]).filter(l=>{const d=new Date(l.date);return d.getFullYear()===y&&d.getMonth()===m})}
function gexp(s,y,m){
  if(s.type==='company')return(s.payouts||[]).filter(p=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m}).reduce((a,p)=>a+p.amount,0);
  if(s.payType==='month'){const ls=glm(s,y,m).filter(l=>!l.missed);return ls.length*s.rate;}
  return glm(s,y,m).filter(l=>l.done&&!l.missed).length*s.rate;
}
function gearn(s,y,m){
  if(s.type==='company')return gexp(s,y,m);
  if(s.payType==='month'){const key=mkKey(y,m);return(s.monthPayments||{})[key]?gexp(s,y,m):0;}
  return glm(s,y,m).filter(l=>l.done&&l.paid&&!l.missed).length*s.rate;
}
function gdebt(s,y,m){
  if(s.type==='company')return 0;
  if(s.payType==='month'){const e=gexp(s,y,m),ea=gearn(s,y,m);return e>0?e-ea:0;}
  return(s.lessons||[]).filter(l=>l.done&&!l.paid&&!l.missed).length*s.rate;
}
function texp(y,m){return S.students.reduce((a,s)=>a+gexp(s,y,m),0)}
function tearn(y,m){return S.students.reduce((a,s)=>a+gearn(s,y,m),0)}
function tdebt(y,m){return S.students.reduce((a,s)=>a+gdebt(s,y,m),0)}
function tyear(){let t=0;const y=S.date.getFullYear();for(let m=0;m<12;m++)t+=texp(y,m);return t}

function openSB(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobOv').style.display='block'}
function closeSB(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobOv').style.display='none'}

function renderSL(){
  const q=(document.getElementById('srch')||{value:''}).value.toLowerCase();
  const y=S.date.getFullYear(),m=S.date.getMonth();
  const html=S.students.filter(s=>s.name.toLowerCase().includes(q)).map(s=>{
    const c=pal(s),debt=gdebt(s,y,m);
    const sub=s.type==='company'?`Платформа · ${fmt(gexp(s,y,m))}`:`${s.level} · ${glm(s,y,m).filter(l=>!l.missed).length} ур.${debt>0?` · <span style="color:var(--danger-tx)">долг</span>`:''}`;
    return `<div class="si${S.selId===s.id?' active':''}" onclick="sel(${s.id})">
      <div class="av" style="width:30px;height:30px;font-size:10px;background:${c.bg};color:${c.tx}">${gi(s.name)}</div>
      <div style="flex:1;min-width:0"><div class="sn">${s.name}</div><div class="ss">${sub}</div></div>
    </div>`;
  }).join('');
  const el=document.getElementById('SL');
  if(el)el.innerHTML=html||'<div style="padding:12px;font-size:12px;color:var(--tx2)">Нет учеников</div>';
}
function sel(id){S.selId=id;S.view='st';closeSB();renderAll()}
function sv(v){S.view=v;if(v!=='st')S.selId=null;renderAll()}
function pm(){S.date=new Date(S.date.getFullYear(),S.date.getMonth()-1,1);renderAll()}
function nm(){S.date=new Date(S.date.getFullYear(),S.date.getMonth()+1,1);renderAll()}
function gt(){S.date=new Date();renderAll()}

function renderAll(){
  document.getElementById('MT').textContent=MN[S.date.getMonth()]+' '+S.date.getFullYear();
  renderSL();
  ['ov','cal','fin','st'].forEach(v=>{const e=document.getElementById('v-'+v);if(e)e.className='tab'+(S.view===v?' active':'');});
  const mc=document.getElementById('MC');if(!mc)return;
  if(S.view==='ov')mc.innerHTML=rOv();
  else if(S.view==='cal')mc.innerHTML=rCal();
  else if(S.view==='fin')mc.innerHTML=rFin();
  else if(S.view==='st')mc.innerHTML=rSt();
}

function rCal(){
  const y=S.date.getFullYear(),m=S.date.getMonth();
  const first=new Date(y,m,1);let sdow=first.getDay()-1;if(sdow<0)sdow=6;
  const dim=new Date(y,m+1,0).getDate(),dipm=new Date(y,m,0).getDate(),tod=new Date();
  const allL=S.students.filter(s=>s.type==='student').flatMap(s=>glm(s,y,m).map(l=>({...l,s})));
  const bd={};allL.forEach(l=>{const d=new Date(l.date).getDate();if(!bd[d])bd[d]=[];bd[d].push(l)});
  S.students.filter(s=>s.type==='company').forEach(s=>{
    (s.payouts||[]).filter(p=>{const d=new Date(p.date);return d.getFullYear()===y&&d.getMonth()===m}).forEach(p=>{
      const d=new Date(p.date).getDate();if(!bd[d])bd[d]=[];bd[d].push({...p,s,isPayout:true});
    });
  });
  let cells=[];
  for(let i=0;i<sdow;i++)cells.push({day:dipm-sdow+1+i,cur:false});
  for(let i=1;i<=dim;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-sdow-dim+1,cur:false});
  return `<div class="pn"><div class="cal">
    ${DN.map(d=>`<div class="cdn">${d}</div>`).join('')}
    ${cells.map(c=>{
      const isT=c.cur&&c.day===tod.getDate()&&y===tod.getFullYear()&&m===tod.getMonth();
      const ls=c.cur?(bd[c.day]||[]):[];
      return `<div class="cd${isT?' today':''}${!c.cur?' oth':''}" onclick="${c.cur?`cdc(${c.day})`:''}">
        <div class="cdnum">${c.day}</div>
        ${ls.slice(0,2).map(l=>{const co=pal(l.s);
          if(l.isPayout)return `<div class="ld" style="background:${co.bg};color:${co.tx}">💰${gi(l.s.name)}</div>`;
          return `<div class="ld" style="background:${co.bg};color:${co.tx};opacity:${l.missed?.4:1};text-decoration:${l.missed?'line-through':'none'}">${gi(l.s.name)}</div>`;
        }).join('')}
        ${ls.length>2?`<div style="font-size:8px;color:var(--tx2)">+${ls.length-2}</div>`:''}
      </div>`;
    }).join('')}
  </div></div>
  <div class="pn"><div class="pt">Уроки — ${MN[m]}</div>
    ${S.students.filter(s=>s.type==='student').flatMap(s=>glm(s,y,m).map(l=>({...l,s}))).sort((a,b)=>new Date(a.date)-new Date(b.date)).map(l=>{
      const c=pal(l.s),d=new Date(l.date);
      return `<div class="row">
        <div class="av" style="width:22px;height:22px;font-size:9px;background:${c.bg};color:${c.tx}">${gi(l.s.name)}</div>
        <div style="font-size:11px;color:var(--tx2);min-width:48px">${d.getDate()} ${MS2[d.getMonth()]}</div>
        <div style="flex:1;font-size:12px;color:var(--tx)">${l.s.name}</div>
        ${lBtns(l.s.id,l.id,l,l.s.payType)}
      </div>`;
    }).join('')||`<div style="font-size:12px;color:var(--tx2)">Нет уроков в этом месяце</div>`}
  </div>`;
}

function lBtns(sid,lid,l,payType){
  const missed=l.missed||false,done=l.done||false;
  return `<div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
    <div style="display:flex;gap:2px">
      <button class="sb${done&&!missed?' s-done':''}" onclick="setDone(${sid},${lid})">${done&&!missed?'✓ Провёл':'Провёл'}</button>
      <button class="sb${missed?' s-miss':''}" onclick="setMissed(${sid},${lid})">${missed?'✗ Не состоялся':'Не состоялся'}</button>
    </div>
    ${payType==='lesson'?`<div class="ls-sep"></div><button class="sb${l.paid?' s-paid':l.done?' s-unpaid':''}" onclick="togPaid(${sid},${lid})">${l.paid?'✓ Оплачен':'Не оплачен'}</button>`:''}
  </div>`;
}

    </div>`;}).join('')||`<div style="font-size:12px;color:var(--tx2)">Нет выплат</div>`}
    </div>`;}).join('')}
  <div class="pn"><div class="pt">Долги</div>
    ${S.students.filter(s=>gdebt(s,y,m)>0).map(s=>{const c=pal(s);return `<div class="row">

function setDone(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.done=true;l.missed=false;save();renderAll()}
function setMissed(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.missed=!l.missed;l.done=false;save();renderAll()}
function togPaid(sid,lid){const s=S.students.find(x=>x.id===sid),l=s.lessons.find(x=>x.id===lid);l.paid=!l.paid;save();renderAll()}
function togMP(sid,y,m){const s=S.students.find(x=>x.id===sid);if(!s.monthPayments)s.monthPayments={};const k=mkKey(y,m);s.monthPayments[k]=!s.monthPayments[k];save();renderAll()}
function th(sid,i){const s=S.students.find(x=>x.id===sid);s.hw[i].d=!s.hw[i].d;save();renderAll()}
function dh(sid,i){S.students.find(x=>x.id===sid).hw.splice(i,1);save();renderAll()}
function sn(sid,v){S.students.find(x=>x.id===sid).notes=v;save()}
function dl(sid,lid){const s=S.students.find(x=>x.id===sid);s.lessons=s.lessons.filter(l=>l.id!==lid);save();renderAll()}
function mapd(sid,y,m){const s=S.students.find(x=>x.id===sid);if(s.payType==='month'){if(!s.monthPayments)s.monthPayments={};s.monthPayments[mkKey(y,m)]=true;}else{s.lessons.filter(l=>l.done&&!l.paid&&!l.missed).forEach(l=>l.paid=true);}save();renderAll()}
function delPayout(sid,pid){const s=S.students.find(x=>x.id===sid);s.payouts=s.payouts.filter(p=>p.id!==pid);save();renderAll()}

function cdc(day){
  const y=S.date.getFullYear(),m=S.date.getMonth(),dt=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
  const stus=S.students.filter(s=>s.type==='student');if(!stus.length)return;
  const opts=stus.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  showMod(`<h3>Добавить урок — ${day} ${MS2[m]}</h3>
    <div class="fg"><label class="fl">Ученик</label><select class="fi" id="f-sid">${opts}</select></div>
    <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-note" placeholder="Тема..."></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="alD('${dt}')">Добавить</button></div>`);
}
function alD(dt){const sid=parseInt(document.getElementById('f-sid').value),note=document.getElementById('f-note').value;S.students.find(x=>x.id===sid).lessons.push({id:Date.now(),date:dt,done:false,paid:false,note});save();cM();renderAll()}
function oAl(sid){const t=new Date().toISOString().split('T')[0];
  showMod(`<h3>Добавить урок</h3>
    <div class="fg"><label class="fl">Дата</label><input class="fi" id="f-dt" type="date" value="${t}"></div>
    <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-nt" placeholder="Тема урока..."></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aL(${sid})">Добавить</button></div>`);
}
function aL(sid){const dt=document.getElementById('f-dt').value,nt=document.getElementById('f-nt').value;if(!dt)return;S.students.find(x=>x.id===sid).lessons.push({id:Date.now(),date:dt,done:false,paid:false,note:nt});save();cM();renderAll()}
function oRep(sid){
  selDays=new Set();
  showMod(`<h3>Повторяющийся урок</h3>
    <p style="font-size:11px;color:var(--tx2);margin-bottom:9px">Выберите дни недели и количество месяцев вперёд</p>
    <div class="fg"><label class="fl">Дни недели</label>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px">
        ${DN.map((d,i)=>`<button class="db-btn" id="db-${i}" onclick="tD(${i})">${d}</button>`).join('')}
      </div>
    </div>
    <div class="fg"><label class="fl">На сколько месяцев вперёд</label>
      <select class="fi" id="f-months">
        <option value="1">1 месяц</option><option value="2">2 месяца</option>
        <option value="3" selected>3 месяца</option><option value="6">6 месяцев</option>
        <option value="12">12 месяцев</option>
      </select>
    </div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aRep(${sid})">Создать</button></div>`);
}
function tD(i){if(selDays.has(i))selDays.delete(i);else selDays.add(i);const b=document.getElementById('db-'+i);if(b)b.className='db-btn'+(selDays.has(i)?' sel':'')}
function aRep(sid){
  if(!selDays.size){cM();return}
  const s=S.students.find(x=>x.id===sid),ahead=parseInt(document.getElementById('f-months').value)||3,sy=S.date.getFullYear(),sm=S.date.getMonth();
  for(let mi=0;mi<ahead;mi++){let mm=sm+mi,yy=sy;while(mm>11){mm-=12;yy++;}
    const dim=new Date(yy,mm+1,0).getDate();
    for(let d=1;d<=dim;d++){const dt=new Date(yy,mm,d);let dow=dt.getDay()-1;if(dow<0)dow=6;
      if(selDays.has(dow)){const ds=`${yy}-${String(mm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if(!s.lessons.some(l=>l.date===ds))s.lessons.push({id:Date.now()+mi*10000+d,date:ds,done:false,paid:false,note:''});}}}
  selDays=new Set();save();cM();renderAll();
}
function oAh(sid){showMod(`<h3>Домашнее задание</h3><div class="fg"><label class="fl">Задание</label><textarea class="ta" id="f-hw" placeholder="Упражнения, эссе..."></textarea></div><div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aH(${sid})">Добавить</button></div>`)}
function aH(sid){const t=(document.getElementById('f-hw').value||'').trim();if(!t)return;S.students.find(x=>x.id===sid).hw.push({t,d:false});save();cM();renderAll()}
function oAddPayout(sid){const t=new Date().toISOString().split('T')[0];
  showMod(`<h3>Внести выплату</h3>
    <div class="fg"><label class="fl">Дата</label><input class="fi" id="f-dt" type="date" value="${t}"></div>
    <div class="fg"><label class="fl">Сумма (₽)</label><input class="fi" id="f-amt" type="number" placeholder="18500"></div>
    <div class="fg"><label class="fl">Примечание</label><input class="fi" id="f-note" placeholder="Выплата 1–15 мая"></div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="addPayout(${sid})">Добавить</button></div>`);
}
function addPayout(sid){const s=S.students.find(x=>x.id===sid),dt=document.getElementById('f-dt').value,amt=parseFloat(document.getElementById('f-amt').value)||0,note=document.getElementById('f-note').value;if(!dt||amt<=0)return;if(!s.payouts)s.payouts=[];s.payouts.push({id:Date.now(),date:dt,amount:amt,note});save();cM();renderAll()}

function cpHtml(cur){return `<div class="color-picker">${PALETTE.map((p,i)=>`<div class="cp-sw${i===cur?' sel':''}" style="background:${p.bg}" onclick="pickC(${i})" title="${p.name}"></div>`).join('')}</div>`}
function pickC(i){_pc=i;document.querySelectorAll('.cp-sw').forEach((el,idx)=>el.classList.toggle('sel',idx===i))}

function openAddSt(){
  _pc=S.students.length%10;
  showMod(`<h3>Новый ученик</h3>
    <div class="fg"><label class="fl">Тип</label>
      <select class="fi" id="f-type" onchange="togType()">
        <option value="student">Частный ученик</option>
        <option value="company">Платформа / Компания</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Имя / Название</label><input class="fi" id="f-nm" placeholder="Анна Петрова / SkyEng"></div>
    <div id="f-sf">
      <div class="fr2">
        <div class="fg" style="flex:1"><label class="fl">Уровень</label><select class="fi" id="f-lv">${LV.map(l=>`<option>${l}</option>`).join('')}</select></div>
        <div class="fg" style="flex:1"><label class="fl">Фокус</label><input class="fi" id="f-fc" placeholder="IELTS, speaking..."></div>
      </div>
      <div class="fr2">
        <div class="fg" style="flex:1"><label class="fl">Телефон</label><input class="fi" id="f-ph"></div>
        <div class="fg" style="flex:1"><label class="fl">Telegram</label><input class="fi" id="f-tg" placeholder="@username"></div>
      </div>
      <div class="fg"><label class="fl">Тип оплаты</label>
        <select class="fi" id="f-pt">
          <option value="lesson">Поурочно</option>
          <option value="month">Помесячно (ставка × кол-во уроков)</option>
        </select>
      </div>
      <div class="fg"><label class="fl">Стоимость одного урока (₽)</label><input class="fi" id="f-rt" type="number" value="1500"></div>
    </div>
    <div id="f-cf" style="display:none">
      <div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-cnote" placeholder="Выплаты раз в 2 недели..."></div>
    </div>
    <div class="fg"><label class="fl">Цвет</label>${cpHtml(_pc)}</div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="aSt()">Добавить</button></div>`);
}
function togType(){const v=document.getElementById('f-type').value;document.getElementById('f-sf').style.display=v==='student'?'':'none';document.getElementById('f-cf').style.display=v==='company'?'':'none'}
function aSt(){
  const nm=(document.getElementById('f-nm').value||'').trim();if(!nm)return;
  const type=document.getElementById('f-type').value,id=Date.now();
  if(type==='company'){S.students.push({id,name:nm,type:'company',payType:'company',color:_pc,level:'',phone:'',tg:'',focus:'',rate:0,mrate:0,notes:document.getElementById('f-cnote').value,lessons:[],hw:[],payouts:[],monthPayments:{}});}
  else{const pt=document.getElementById('f-pt').value;S.students.push({id,name:nm,level:document.getElementById('f-lv').value,focus:document.getElementById('f-fc').value||'Общий',phone:document.getElementById('f-ph').value,tg:document.getElementById('f-tg').value,type:'student',payType:pt,color:_pc,rate:parseInt(document.getElementById('f-rt').value||1500),mrate:0,lessons:[],hw:[],notes:'',monthPayments:{}});}
  save();cM();S.selId=id;S.view='st';renderAll();
}
function oEs(sid){
  const s=S.students.find(x=>x.id===sid);_pc=s.color;
  if(s.type==='company'){showMod(`<h3>Редактировать: ${s.name}</h3><div class="fg"><label class="fl">Название</label><input class="fi" id="f-nm" value="${s.name}"></div><div class="fg"><label class="fl">Заметка</label><input class="fi" id="f-cnote" value="${s.notes||''}"></div><div class="fg"><label class="fl">Цвет</label>${cpHtml(s.color)}</div><div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="svSt(${sid})">Сохранить</button></div>`);return;}
  showMod(`<h3>Редактировать ученика</h3>
    <div class="fg"><label class="fl">Имя</label><input class="fi" id="f-nm" value="${s.name}"></div>
    <div class="fr2">
      <div class="fg" style="flex:1"><label class="fl">Уровень</label><select class="fi" id="f-lv">${LV.map(l=>`<option${l===s.level?' selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fg" style="flex:1"><label class="fl">Фокус</label><input class="fi" id="f-fc" value="${s.focus||''}"></div>
    </div>
    <div class="fr2">
      <div class="fg" style="flex:1"><label class="fl">Телефон</label><input class="fi" id="f-ph" value="${s.phone||''}"></div>
      <div class="fg" style="flex:1"><label class="fl">Telegram</label><input class="fi" id="f-tg" value="${s.tg||''}"></div>
    </div>
    <div class="fg"><label class="fl">Тип оплаты</label>
      <select class="fi" id="f-pt">
        <option value="lesson"${s.payType==='lesson'?' selected':''}>Поурочно</option>
        <option value="month"${s.payType==='month'?' selected':''}>Помесячно (ставка × кол-во уроков)</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Стоимость одного урока (₽)</label><input class="fi" id="f-rt" type="number" value="${s.rate}"></div>
    <div class="fg"><label class="fl">Цвет</label>${cpHtml(s.color)}</div>
    <div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-p" onclick="svSt(${sid})">Сохранить</button></div>`);
}
function svSt(sid){
  const s=S.students.find(x=>x.id===sid);s.name=(document.getElementById('f-nm').value||s.name).trim();s.color=_pc;
  if(s.type==='company'){s.notes=document.getElementById('f-cnote')?.value||s.notes;}
  else{s.level=document.getElementById('f-lv').value;s.focus=document.getElementById('f-fc').value||s.focus;s.phone=document.getElementById('f-ph').value;s.tg=document.getElementById('f-tg').value;s.payType=document.getElementById('f-pt').value;s.rate=parseInt(document.getElementById('f-rt').value)||s.rate;}
  save();cM();renderAll();
}
function confDel(sid){const s=S.students.find(x=>x.id===sid);showMod(`<h3>Удалить?</h3><p style="font-size:12px;color:var(--tx2);margin-bottom:12px">«${s.name}» будет удалён навсегда.</p><div class="fa"><button class="btn" onclick="cM()">Отмена</button><button class="btn btn-d" onclick="dSt(${sid})">Удалить</button></div>`)}
function dSt(sid){S.students=S.students.filter(s=>s.id!==sid);S.selId=null;S.view='ov';save();cM();renderAll()}
function showMod(h){document.getElementById('MOD').innerHTML=`<div class="mo" onclick="cMO(event)"><div class="md">${h}</div></div>`}
function cMO(e){if(e.target.classList.contains('mo'))cM()}
function cM(){document.getElementById('MOD').innerHTML=''}
load();
</script>
</body>
</html>
